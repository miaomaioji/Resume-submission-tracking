name: Build Android APK

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  apk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - run: npm ci
      - name: Build web (Capacitor base, no service worker)
        run: CAP=1 npm run build
      - name: Add Android platform
        run: npx cap add android
      - name: Sync web assets into Android
        run: npx cap sync android
      - name: Build debug APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon
      - name: Rename APK
        run: cp android/app/build/outputs/apk/debug/app-debug.apk "resume-tracker-${{ github.ref_name }}.apk"
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: apk
          path: resume-tracker-*.apk
      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: resume-tracker-*.apk
          name: ${{ github.ref_name }}
          body: |
            简历投递管理 — Android APK

            - 本地优先:数据存在手机本地,离线可用,不上传服务器。
            - **debug 签名**:安装时请在系统「设置 → 安全」允许「未知来源 / 安装未知应用」。
            - 也可直接用网页版:https://miaomaioji.github.io/-Resume-submission-tracking-/
